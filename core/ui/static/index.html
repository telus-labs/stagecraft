<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>devteam</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header>
  <h1>devteam <span class="track" data-track>—</span></h1>
  <div class="meta">
    <span class="cwd" data-cwd></span>
    <span class="status-bar" data-status></span>
  </div>
</header>

<div class="next-action" data-next hidden>
  <span class="next-icon" data-next-icon></span>
  <div class="next-body">
    <span class="next-text" data-next-text></span>
    <code class="next-command" data-next-command></code>
  </div>
  <button class="copy-btn" data-next-copy title="Copy command to clipboard">Copy</button>
</div>

<main>
  <section class="pipeline">
    <div class="pipeline-controls">
      <div class="progress-summary" data-progress></div>
      <div class="filter-strip">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="fail">Failing</button>
        <button class="filter-btn" data-filter="action">Needs action</button>
      </div>
    </div>
    <ol class="stages" data-stages></ol>
    <button class="collapse-pending" data-collapse-pending hidden></button>
  </section>

  <aside class="detail" data-detail>
    <div class="detail-empty">Select a stage to inspect its gate.</div>
  </aside>
</main>

<footer>
  <span class="hosts" data-hosts></span>
  <span class="connection" data-connection>connecting…</span>
</footer>

<script src="/app.js"></script>
</body>
</html>
