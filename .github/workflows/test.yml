name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Verify devteam CLI loads
        run: ./bin/devteam help

      - name: Verify devteam doctor against a fresh init
        run: |
          TARGET=$(mktemp -d)
          ./bin/devteam init --host claude-code --cwd "$TARGET"
          ./bin/devteam doctor --cwd "$TARGET"
