name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions: the test workflow only needs to read source.
# Lints, tests, consistency checks, and the devteam-doctor smoke test
# don't write to issues, PRs, packages, or anything else. CodeQL flags
# workflows without explicit permissions because the default
# GITHUB_TOKEN otherwise has overly-broad write scope.
permissions:
  contents: read

jobs:
  test:
    name: node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Node 18 reached EOL in April 2025; @huggingface/transformers ^4.x
        # requires Node >=20. Test current LTS (20, 22) + latest (24).
        node-version: ['20', '22', '24']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run test suite
        run: npm test
        env:
          DEVTEAM_HEADLESS_COMMAND: cat

      # Coverage report — report-only, never fails the build.
      # Baseline recorded at item 3.6 (2026-06-11):
      #   lines: 85.43%  branches: 76.02%  functions: 82.42%
      # No threshold is set yet; thresholds without history invite gaming.
      - name: Coverage report (informational)
        continue-on-error: true
        run: node --test --experimental-test-coverage tests/*.test.js
        env:
          DEVTEAM_HEADLESS_COMMAND: cat

      - name: Run consistency checks
        run: npm run consistency

      - name: Verify devteam CLI loads
        run: ./bin/devteam help

      - name: Verify devteam doctor against a fresh init
        run: |
          TARGET=$(mktemp -d)
          ./bin/devteam init --host claude-code --cwd "$TARGET"
          ./bin/devteam doctor --cwd "$TARGET"

      - name: Changelog fragment guard
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Default checkout is shallow (depth 1); fetch the base branch so the
          # diff is available. GITHUB_BASE_REF is set to e.g. "main" for PRs.
          git fetch --depth=1 origin "$GITHUB_BASE_REF"
          BASE_REF="origin/$GITHUB_BASE_REF"
          GUARD_CHANGED=$(git diff --name-only "$BASE_REF" HEAD)
          GUARD_FRAGMENTS=$(git diff --name-only --diff-filter=AM "$BASE_REF" HEAD \
            | grep '^changelog\.d/.*\.md$' | grep -v 'README\.md' || true)
          GUARD_SKIP="$PR_TITLE"$'\n'$(git log --format=%s "$BASE_REF"..HEAD)
          export GUARD_CHANGED GUARD_FRAGMENTS GUARD_SKIP
          node scripts/changelog-guard.js
